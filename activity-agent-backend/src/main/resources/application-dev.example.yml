# ===========================================
# 本地开发环境配置模板
# ===========================================
# 使用方法：
#   1. 复制此文件为 application-dev.yml
#   2. 填写你的本地配置
#   3. 启动时指定 profile：--spring.profiles.active=dev
# ===========================================

# 数据库
MYSQL_HOST: localhost
MYSQL_PORT: 3306
MYSQL_DATABASE: activity_agent
MYSQL_USER: your_mysql_user
MYSQL_PASSWORD: your_mysql_password

# Redis
REDIS_HOST: localhost
REDIS_PORT: 6379
REDIS_PASSWORD: your_redis_password
REDIS_DATABASE: 0

# Agent 服务
AGENT_PYTHON_URL: http://localhost:8000
